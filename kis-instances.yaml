apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-config
data:
  # 💡 암호나 설정값을 소스코드가 아닌 안전한 쿠버네티스 주머니에 보관합니다.
  INSTANCE_NAME: "SECURE-TEMPLATED-BANANA-AAAA"
  KIS_API_URL: "https://openapi.koreainvestment.com:9443"
---
# (이 아래로 기존 king-load-balancer 및 nginx deployment 내용이 이어집니다)
# kis-instances.yaml
apiVersion: v1
kind: Service
metadata:
  name: king-load-balancer
spec:
  type: LoadBalancer
  ports:
  - port: 8080        # 내 PC 진입 통로
    targetPort: 80    # 내부 Nginx의 80번 포트로 연결
  selector:
    tier: proxy-instance # 아래 2대로 늘어난 Nginx 파드를 동시에 조준합니다!

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instance-web-fastapi-deploy
spec:
  replicas: 3         # 💡 [안정성 UP] 기존 2대에서 '3대'로 일꾼 확장!
  selector:
    matchLabels:
      app: fastapi-web-pod
  template:
    metadata:
      labels:
        app: fastapi-web-pod
    spec:
      containers:
      - name: fastapi
        image: kis-fastapi-web:v3
        imagePullPolicy: Never
        # 💡 [추가] 컨테이너 내부에 가상 하드디스크를 꽂을 꽂이(마운트) 주소를 정합니다.
        volumeMounts:
        - name: trading-log-storage
          mountPath: /app/logs
      volumes:
      - name: trading-log-storage
        hostPath:
          path: /c/kis-auto-trading/logs # 내 윈도우 PC의 실제 폴더 경로
          type: DirectoryOrCreate       # 폴더가 없으면 쿠버네티스가 자동으로 만듭니다.
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  ports:
  - port: 8000
  selector:
    app: fastapi-web-pod # 3대로 늘어난 일꾼들에게 부하 분산

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instance-web-nginx-deploy
spec:
  replicas: 2         # 💡 [핵심] 문지기 Nginx를 '2대'로 확장! (1대가 죽어도 절대 안 멈춤)
  selector:
    matchLabels:
      app: nginx-web-pod
  template:
    metadata:
      labels:
        app: nginx-web-pod
        tier: proxy-instance # 위의 king-load-balancer와 연결선 유지
    spec:
      containers:
      - name: nginx
        image: kis-nginx:v4
        imagePullPolicy: Never
        env:
# 💡 [수정] 직접 글자를 박지 않고, trading-config 주머니의 INSTANCE_NAME 값을 훔쳐옵니다!
        - name: INSTANCE_NAME
          valueFrom:
            configMapKeyRef:
              name: trading-config
              key: INSTANCE_NAME
        - name: NGINX_ENVSUBST_OUTPUT_DIR
          value: "/etc/nginx"